name: ci

on:
  push:
  pull_request:

jobs:
  unix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential make libsdl2-dev gcc-mingw-w64-x86-64 g++-mingw-w64-x86-64 cmake unzip
      - name: Release check
        run: make release-check
      - name: Vendored Win32 SDL package check
        run: make win32-vendored-package-check
      - uses: actions/upload-artifact@v4
        with:
          name: nightshift-unix
          path: |
            dist/nightshift-*-unix.tar.gz
            dist/nightshift-*-unix.tar.gz.sha256

  win32:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            make
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-SDL2
            unzip
      - name: Win32 SDL release check
        run: make WIN32_CC=gcc WIN32_PKG_CONFIG=pkg-config win32-sdl-release-check
      - name: Verify Win32 artifacts
        run: |
          cd dist
          sha256sum -c nightshift-*-win32.zip.sha256
          sha256sum -c nightshift-*-win32-setup.exe.sha256
          unzip -t nightshift-*-win32.zip
          unzip -Z1 nightshift-*-win32.zip | grep -q '^nightshift.exe$'
          unzip -Z1 nightshift-*-win32.zip | grep -q '^SDL2.dll$'
          test -s nightshift-*-win32-setup.exe
      - name: Native Win32 package run
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $zip = Get-ChildItem dist\nightshift-*-win32.zip | Select-Object -First 1
          $setup = Get-ChildItem dist\nightshift-*-win32-setup.exe | Select-Object -First 1
          $zipDir = Join-Path $env:RUNNER_TEMP 'nightshift-zip'
          $installDir = Join-Path $env:RUNNER_TEMP 'nightshift-installed'
          New-Item -ItemType Directory -Force -Path $zipDir, $installDir | Out-Null
          Expand-Archive -Path $zip.FullName -DestinationPath $zipDir
          $setupProcess = Start-Process -FilePath $setup.FullName -ArgumentList @('/S', '/NODESKTOP', "/D=$installDir") -Wait -PassThru
          if ($null -ne $setupProcess.ExitCode -and $setupProcess.ExitCode -ne 0) {
            Get-ChildItem -Force $installDir -ErrorAction SilentlyContinue | Format-List
            throw "setup failed with exit code $($setupProcess.ExitCode)"
          }
          if (-not (Test-Path (Join-Path $installDir 'nightshift.exe'))) {
            Get-ChildItem -Force $installDir -ErrorAction SilentlyContinue | Format-List
            throw "setup did not install nightshift.exe"
          }
          $executables = @(
            (Join-Path $zipDir 'nightshift.exe'),
            (Join-Path $installDir 'nightshift.exe')
          )
          foreach ($exe in $executables) {
            $exeDir = Split-Path $exe
            $exeName = Split-Path -Leaf $exe
            if (-not (Test-Path (Join-Path $exeDir 'SDL2.dll'))) {
              throw "SDL2.dll missing beside $exe"
            }
            Push-Location $exeDir
            try {
              $version = (& ".\$exeName" --version 2>&1 | Out-String).Trim()
              $versionExitCode = $LASTEXITCODE
              $versionLines = $version -split '\r?\n' | ForEach-Object { $_.Trim() }
              if ($versionExitCode -ne 0 -or $versionLines -notcontains 'Night Shift 0.1.0') {
                throw "version check failed for $exe exit=$versionExitCode output=[$version]"
              }
              $help = (& ".\$exeName" --help 2>&1 | Out-String).Trim()
              $helpExitCode = $LASTEXITCODE
              if ($helpExitCode -ne 0 -or $help -notmatch '(?m)^Usage:') {
                throw "help check failed for $exe exit=$helpExitCode output=[$help]"
              }
            } finally {
              Pop-Location
            }
          }
      - uses: actions/upload-artifact@v4
        with:
          name: nightshift-win32
          path: |
            dist/nightshift-*-win32.zip
            dist/nightshift-*-win32.zip.sha256
            dist/nightshift-*-win32-setup.exe
            dist/nightshift-*-win32-setup.exe.sha256
